<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
    }
    h2 { margin: 0 0 12px; font-size: 16px; color: #1a5276; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    button#vote-btn {
      width: 100%;
      padding: 8px;
      background: #1a5276;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button#vote-btn:hover { background: #154360; }
    button#vote-btn:disabled { background: #aaa; cursor: not-allowed; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #333;
      min-height: 40px;
      white-space: pre-wrap;
    }
    .success { color: #1e8449; }
    .error { color: #c0392b; }
    .warning { color: #d68910; }
    .note {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <h2>🗳️ Chronogram Auto-Voter</h2>

  <label for="email">Your Email</label>
  <input type="email" id="email" placeholder="you@example.com">

  <label for="target">Nominee Name (partial match ok)</label>
  <input type="text" id="target" placeholder="e.g. Kingston Bread">

  <button id="vote-btn">Vote Now</button>

  <div id="status"></div>

  <div class="note">
    Must be on the Chronogram ballot page.<br>
    You can vote once per day per category.
  </div>

  <script src="popup.js"></script>
</body>
</html>
